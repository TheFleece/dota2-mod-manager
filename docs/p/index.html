<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Dota 2 Mod Manager — preset</title>
<!--
  Chat clients only turn http(s) into clickable links, never custom schemes, so a bare
  d2mm:// link sits in Discord as dead text. This page is the clickable wrapper: it hands
  the preset over to the app.

  The preset code lives in the URL *fragment*. Browsers never send a fragment to the
  server, so GitHub serves this page without ever seeing which mods anyone shares.
-->
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #0d0d13; color: #e9e7f2;
    font: 15px/1.65 system-ui, "Segoe UI", Roboto, sans-serif;
  }
  .box { width: min(520px, 90vw); padding: 34px 30px; text-align: center; }
  .logo {
    width: 54px; height: 54px; margin: 0 auto 18px; border-radius: 14px;
    background: linear-gradient(140deg, #7c5cff, #b79dff);
    display: grid; place-items: center; font-weight: 800; font-size: 17px; color: #12101c;
  }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { margin: 0 0 22px; color: #a8a2c0; }
  .btn {
    display: inline-block; padding: 12px 24px; border-radius: 11px;
    background: #7c5cff; color: #fff; text-decoration: none; font-weight: 600; font-size: 15px;
  }
  .btn:hover { background: #8f74ff; }
  .muted { font-size: 12.5px; color: #726c8c; margin: 26px 0 0; }
  .muted a { color: #a992ff; }
  .bad { color: #ff8098; }
  .lang { position: fixed; top: 16px; right: 18px; display: flex; gap: 4px; }
  .lang button {
    background: none; border: 1px solid #2a2440; color: #726c8c; cursor: pointer;
    font: 600 11.5px/1 system-ui, sans-serif; padding: 6px 10px; border-radius: 8px;
  }
  .lang button.on { color: #d8d2f0; border-color: #4a3f75; background: #1a1630; }
</style>
</head>
<body>
<div class="lang">
  <button type="button" data-lang="en">EN</button>
  <button type="button" data-lang="ru">RU</button>
</div>
<div class="box">
  <div class="logo">D2M</div>
  <h1 id="title"></h1>
  <p id="lead"></p>
  <a class="btn" id="open" href="#"></a>
  <p class="muted" id="foot"></p>
</div>
<script>
  var STR = {
    en: {
      title: 'Opening the preset…', lead: 'If nothing happens, use the button below.',
      open: 'Open in Mod Manager',
      foot: 'Don\'t have the app? <a href="https://github.com/TheFleece/dota2-mod-manager/releases/latest">Download it</a> and open this link again.',
      bad: 'No preset in this link', badLead: 'It looks like the link got cut off. Ask for the whole thing.'
    },
    ru: {
      title: 'Открываю пресет…', lead: 'Если ничего не произошло, нажми кнопку ниже.',
      open: 'Открыть в Mod Manager',
      foot: 'Нет приложения? <a href="https://github.com/TheFleece/dota2-mod-manager/releases/latest">Скачай</a> и открой эту ссылку ещё раз.',
      bad: 'В ссылке нет пресета', badLead: 'Похоже, ссылку обрезали при копировании. Попроси прислать её целиком.'
    }
  };

  var $ = function (id) { return document.getElementById(id); };
  var code = (location.hash || '').replace(/^#/, '');
  // only ever build a link out of the exact alphabet the app emits
  var ok = /^[A-Za-z0-9_-]+$/.test(code);
  var saved = null;
  try { saved = localStorage.getItem('d2mmLang'); } catch (e) { /* private mode */ }
  var lang = saved || ((navigator.language || '').toLowerCase().indexOf('ru') === 0 ? 'ru' : 'en');

  function apply(l) {
    lang = l;
    var t = STR[l];
    document.documentElement.lang = l;
    try { localStorage.setItem('d2mmLang', l); } catch (e) { /* private mode */ }
    Array.prototype.forEach.call(document.querySelectorAll('.lang button'), function (b) {
      b.classList.toggle('on', b.dataset.lang === l);
    });
    $('title').textContent = ok ? t.title : t.bad;
    $('title').className = ok ? '' : 'bad';
    $('lead').textContent = ok ? t.lead : t.badLead;
    $('open').textContent = t.open;
    $('foot').innerHTML = t.foot;
  }

  Array.prototype.forEach.call(document.querySelectorAll('.lang button'), function (b) {
    b.addEventListener('click', function () { apply(b.dataset.lang); });
  });
  apply(lang);

  if (!ok) {
    $('open').style.display = 'none';
    $('foot').style.display = 'none';
  } else {
    var deep = 'd2mm://preset/' + code;
    $('open').href = deep;
    // browsers differ on whether a custom scheme may fire without a click, so try once and
    // leave the button as the reliable path
    try { location.href = deep; } catch (e) { /* the button still works */ }
  }
</script>
</body>
</html>
